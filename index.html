<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>XL Web Panel</title>
</head>
<body>
  <h2>XL Panel (CORS FIX VERSION)</h2>
  <button onclick="testApi()">Test API</button>
  <pre id="output"></pre>

<script>
function apiGet(path) {
  return fetch('/api/proxy?path=' + encodeURIComponent(path))
    .then(async r => {
      const data = await r.json();
      return { ok: r.ok, data };
    })
    .catch(e => ({ ok: false, data: e.message }));
}

async function testApi() {
  const res = await apiGet('/v2/balance');
  document.getElementById('output').textContent = JSON.stringify(res, null, 2);
}
</script>
</body>
</html>
